name: build-wheels
on: [push, pull_request]
jobs:
  build-wheels-linux-x86_64:
    name: Build wheels on Ubuntu (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build wheels (x86_64)
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget cmake &&
            mkdir -p /tmp/deps &&
            wget https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz &&
            tar zxvf eigen-5.0.0.tar.gz &&
            cd eigen-5.0.0 &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc &&
            make install &&
            cd ../.. &&
            wget https://github.com/HDFGroup/hdf5/archive/refs/tags/2.1.0.tar.gz -O hdf5-2.1.0.tar.gz &&
            tar zxvf hdf5-2.1.0.tar.gz &&
            cd hdf5-2.1.0 &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DBUILD_SHARED_LIBS=ON &&
            make &&
            make install &&
            cd ../.. &&
            yum install -y python3-devel
          CIBW_ENVIRONMENT: >
            HDF5_ROOT=/tmp/deps
            PKG_CONFIG_PATH=/tmp/deps/lib/pkgconfig
            LD_LIBRARY_PATH=/tmp/deps/lib
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
      - name: Upload built wheels (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: ./wheelhouse/*.whl

  build-wheels-linux-aarch64:
    name: Build wheels on Ubuntu (aarch64)
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build wheels (aarch64)
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "aarch64"
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget cmake &&
            mkdir -p /tmp/deps &&
            wget https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz &&
            tar zxvf eigen-5.0.0.tar.gz &&
            cd eigen-5.0.0 &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc &&
            make install &&
            cd ../.. &&
            wget https://github.com/HDFGroup/hdf5/archive/refs/tags/2.1.0.tar.gz -O hdf5-2.1.0.tar.gz &&
            tar zxvf hdf5-2.1.0.tar.gz &&
            cd hdf5-2.1.0 &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DBUILD_SHARED_LIBS=ON &&
            make &&
            make install &&
            cd ../.. &&
            yum install -y python3-devel
          CIBW_ENVIRONMENT: >
            HDF5_ROOT=/tmp/deps
            PKG_CONFIG_PATH=/tmp/deps/lib/pkgconfig
            LD_LIBRARY_PATH=/tmp/deps/lib
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
      - name: Upload built wheels (aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: ./wheelhouse/*.whl

  build-wheels-macos-14:
    name: Build wheels on macOS (arm mac)
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_BEFORE_ALL_MACOS: >
            brew install gcc@14 wget cmake &&
            mkdir -p /tmp/deps &&
            wget https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz &&
            tar zxvf eigen-5.0.0.tar.gz &&
            cd eigen-5.0.0 &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_C_COMPILER=gcc-14 &&
            make install &&
            cd ../.. &&
            wget https://github.com/HDFGroup/hdf5/archive/refs/tags/2.1.0.tar.gz -O hdf5-2.1.0.tar.gz &&
            tar zxvf hdf5-2.1.0.tar.gz &&
            cd hdf5-2.1.0 &&
            mkdir build &&
            cd build &&
            cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DBUILD_SHARED_LIBS=ON &&
            make &&
            make install &&
            cd ../..
          CIBW_ENVIRONMENT_MACOS: CC=gcc-14 CXX=g++-14 PKG_CONFIG_PATH=/tmp/deps/lib/pkgconfig LD_LIBRARY_PATH=/tmp/deps/lib HDF5_ROOT=/tmp/deps
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
      - name: Upload built wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Make sdist
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build source distribution
        run: python -m build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz