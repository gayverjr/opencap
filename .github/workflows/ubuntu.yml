name: ubuntu
on: [push]
jobs:
  build-linux:
    name: Build and test on Ubuntu
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov doxygen software-properties-common libstdc++-11-dev wget cmake gcc g++
          mkdir -p /tmp/deps
          wget https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.gz
          tar zxvf eigen-5.0.0.tar.gz
          cd eigen-5.0.0
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc
          make install
          cd ../..
          wget https://github.com/HDFGroup/hdf5/archive/refs/tags/2.1.0.tar.gz -O hdf5-2.1.0.tar.gz
          tar zxvf hdf5-2.1.0.tar.gz
          cd hdf5-2.1.0
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/deps -DBUILD_SHARED_LIBS=ON
          make
          make install
          cd ../..
      - name: Build and test OpenCAP
        run: |
          set -e
          export PKG_CONFIG_PATH=/tmp/deps/lib/pkgconfig
          export LD_LIBRARY_PATH=/tmp/deps/lib
          export CPATH=/tmp/deps/include:$CPATH
          cd opencap
          mkdir -p build && cd build
          cmake -DCODE_COVERAGE=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DHDF5_ROOT=/tmp/deps ..
          make -j$(nproc)
          ctest --output-on-failure
          cd ../../
      - name: Build and test PyOpenCAP
        run: |
          set -e
          export PKG_CONFIG_PATH=/tmp/deps/lib/pkgconfig
          export LD_LIBRARY_PATH=/tmp/deps/lib
          export CPATH=/tmp/deps/include:$CPATH
          export HDF5_ROOT=/tmp/deps
          pip install pytest pytest-cov h5py numpy pyscf codecov numgrid pandas
          pip install .
          cd pyopencap
          pytest --cov=pyopencap --cov-report=xml
          cd ..
      - name: Upload coverage reports
        run: |
          cd opencap/build
          lcov --directory . --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' "${HOME}"'/.cache/*' '*eigen*' '*_deps*' '*tests*' --output-file coverage.info
          lcov --list coverage.info
          bash <(curl -s https://codecov.io/bash) -f coverage.info || echo "Codecov did not collect C++ reports"
          cd ../../pyopencap
          bash <(curl -s https://codecov.io/bash) -f coverage.xml || echo "Codecov did not collect Python reports"